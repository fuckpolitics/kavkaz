name: tmpapp

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kavkaz}
      POSTGRES_USER: ${DB_USERNAME:-kavkaz}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - tmpapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      UPLOAD_DIR: /app/uploads
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-kavkaz}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-kavkaz}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-false}
      DB_SSL: ${DB_SSL:-false}
      OTP_TEST_MODE: ${OTP_TEST_MODE:-false}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-10}
      OTP_TEST_CODE: ${OTP_TEST_CODE:-0000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@kaishaku.ninja}
      MAIL_BRAND_NAME: ${MAIL_BRAND_NAME:-Туры по Кавказу}
      SMS_PROVIDER: ${SMS_PROVIDER:-smsru}
      SMSRU_API_ID: ${SMSRU_API_ID:-}
      SMSC_LOGIN: ${SMSC_LOGIN:-}
      SMSC_PASSWORD: ${SMSC_PASSWORD:-}
      SMS_FROM: ${SMS_FROM:-}
    volumes:
      - tmpapp_uploads:/app/uploads
    expose:
      - '3000'

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}/api
        INTERNAL_API_URL: http://api:3000/api
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}/api
      INTERNAL_API_URL: http://api:3000/api
    expose:
      - '3001'

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - '8080:80'
    volumes:
      - ./deploy/nginx.tmpapp.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  tmpapp_pgdata:
  tmpapp_uploads:
